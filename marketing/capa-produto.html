<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 300px; height: 250px; overflow: hidden; }

  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,800;1,9..144,400&family=JetBrains+Mono:wght@400&display=swap');

  body {
    width: 300px;
    height: 250px;
    background: #f1e9da;
    font-family: 'Fraunces', Georgia, serif;
    position: relative;
    overflow: hidden;
  }

  /* Grid de fundo */
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(25,21,15,.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(25,21,15,.07) 1px, transparent 1px);
    background-size: 14px 14px;
  }

  /* Faixa lateral esquerda vermelhão */
  .faixa {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 6px;
    background: #d8402a;
  }

  /* Conteúdo */
  .conteudo {
    position: absolute;
    inset: 0;
    padding: 22px 20px 18px 26px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .topo {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .estrela {
    font-size: 14px;
    color: #d8402a;
    letter-spacing: 0;
    line-height: 1;
    margin-bottom: 2px;
  }

  .marca {
    font-family: 'JetBrains Mono', monospace;
    font-size: 7.5px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: #6b6152;
    line-height: 1;
  }

  .titulo {
    margin-top: 10px;
  }

  .titulo-principal {
    font-size: 28px;
    font-weight: 800;
    color: #19150f;
    line-height: 1.0;
    letter-spacing: -.02em;
  }

  .titulo-ia {
    color: #d8402a;
  }

  .subtitulo {
    font-style: italic;
    font-weight: 400;
    font-size: 13px;
    color: #6b6152;
    line-height: 1.3;
    margin-top: 6px;
  }

  .rodape {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .chips {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
  }

  .chip {
    font-family: 'JetBrains Mono', monospace;
    font-size: 6px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: #3d3727;
    background: rgba(25,21,15,.08);
    border-radius: 2px;
    padding: 3px 6px;
  }

  .num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 7px;
    color: #a89e8e;
    letter-spacing: .1em;
    text-align: right;
    line-height: 1.4;
  }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="faixa"></div>
  <div class="conteudo">
    <div class="topo">
      <div class="estrela">★</div>
      <div class="marca">Fábrica de Projetos com IA</div>
      <div class="titulo">
        <div class="titulo-principal">Crie com<br><span class="titulo-ia">I.A.</span><br>sem programar.</div>
      </div>
      <div class="subtitulo">Plugin · Projetos · Prompts</div>
    </div>
    <div class="rodape">
      <div class="chips">
        <span class="chip">12 skills</span>
        <span class="chip">12 projetos</span>
        <span class="chip">prompts prontos</span>
      </div>
      <div class="num">PACK<br>COMPLETO</div>
    </div>
  </div>
</body>
</html>
